name: validate combos

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: self-test
        run: python scripts/validate_combos.py --self-test
      - name: validate combos
        run: python scripts/validate_combos.py
